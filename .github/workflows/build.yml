name: Build App

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manueller Start per Knopfdruck auf GitHub

jobs:

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: pip install customtkinter pandas openpyxl pyinstaller

      - name: Kompilieren (.app)
        run: pyinstaller --onefile --windowed --name "CSV Konverter" csv_converter.py

      - name: App als ZIP verpacken
        run: cd dist && zip -r "../CSV_Konverter_macOS.zip" "CSV Konverter.app"

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: CSV_Konverter_macOS
          path: CSV_Konverter_macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: pip install customtkinter pandas openpyxl pyinstaller

      - name: Kompilieren (.exe)
        run: pyinstaller --onefile --windowed --name "CSV Konverter" csv_converter.py

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: CSV_Konverter_Windows
          path: dist\CSV Konverter.exe
