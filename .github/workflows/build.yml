name: Build App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Python installieren
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: pip install customtkinter pandas openpyxl pyinstaller

      - name: Kompilieren (.app)
        run: pyinstaller --onefile --windowed --name "CSV Konverter" csv_converter.py

      - name: App als ZIP verpacken
        run: cd dist && zip -r "../CSV_Konverter_macOS.zip" "CSV Konverter.app"

      - name: Upload macOS Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: CSV_Konverter_macOS
          path: CSV_Konverter_macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Python installieren
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: pip install customtkinter pandas openpyxl pyinstaller

      - name: Kompilieren (.exe)
        run: pyinstaller --onefile --windowed --name "CSV Konverter" csv_converter.py

      - name: Upload Windows Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: CSV_Konverter_Windows
          path: dist\CSV Konverter.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: macOS App herunterladen
        uses: actions/download-artifact@v4
        with:
          name: CSV_Konverter_macOS

      - name: Windows App herunterladen
        uses: actions/download-artifact@v4
        with:
          name: CSV_Konverter_Windows

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: CSV Konverter
          body: |
            ## CSV Konverter

            Konvertiert medizinische Monitor-CSV Dateien zu Minuten-Mittelwerten.

            ### Download
            - **Mac**: `CSV_Konverter_macOS.zip` herunterladen → entpacken → App öffnen
            - **Windows**: `CSV Konverter.exe` herunterladen → direkt öffnen

            ### Hinweis Mac
            Beim ersten Öffnen: Rechtsklick auf die App → "Öffnen" → "Öffnen"
          files: |
            CSV_Konverter_macOS.zip
            CSV Konverter.exe
